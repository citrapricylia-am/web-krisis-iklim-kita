
<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krisis Iklim Kita - Memahami Keadilan Iklim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFBF7;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }
        .neo-brutalism-shadow {
            box-shadow: 4px 4px 0px 0px rgba(28, 25, 23, 1);
        }
        .neo-brutalism-shadow-hover:hover {
            box-shadow: 8px 8px 0px 0px rgba(28, 25, 23, 1);
            transform: translate(-2px, -2px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Accessibility Utility Classes */
        html.text-large { font-size: 115%; }
        html.text-extra-large { font-size: 130%; }

        /* High Contrast Mode */
        html.high-contrast body {
            background-color: #000000 !important;
            color: #FFFF00 !important;
        }
        html.high-contrast header, 
        html.high-contrast section,
        html.high-contrast footer,
        html.high-contrast nav {
            background-color: #000000 !important;
            border-color: #FFFF00 !important;
        }
        html.high-contrast .text-stone-600,
        html.high-contrast .text-stone-400,
        html.high-contrast .text-stone-700,
        html.high-contrast .text-stone-800 {
            color: #FFFF00 !important;
        }
        html.high-contrast h1, 
        html.high-contrast h2, 
        html.high-contrast h3,
        html.high-contrast p,
        html.high-contrast span,
        html.high-contrast i,
        html.high-contrast b {
            color: #FFFF00 !important;
        }
        html.high-contrast button,
        html.high-contrast a,
        html.high-contrast .neo-brutalism-shadow {
            border-color: #FFFF00 !important;
            background-color: #000000 !important;
            color: #FFFF00 !important;
            box-shadow: 4px 4px 0px 0px #FFFF00 !important;
        }
        html.high-contrast svg {
            stroke: #FFFF00 !important;
        }

        /* Dark Mode */
        html.dark-mode body {
            background-color: #1c1917 !important;
            color: #f5f5f4 !important;
        }
        html.dark-mode header,
        html.dark-mode section,
        html.dark-mode footer {
            background-color: #1c1917 !important;
            border-color: #44403c !important;
        }
        html.dark-mode .bg-white {
            background-color: #292524 !important;
        }
        html.dark-mode .text-stone-600,
        html.dark-mode .text-stone-700 {
            color: #d6d3d1 !important;
        }
        html.dark-mode .text-stone-900 {
            color: #fafaf9 !important;
        }
        html.dark-mode .neo-brutalism-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 0.5);
            border-color: #44403c !important;
        }

        /* Highlight Links */
        html.highlight-links a, 
        html.highlight-links button[role="link"] {
            outline: 4px solid #FACC15 !important;
            outline-offset: 2px !important;
            text-decoration: underline !important;
            font-weight: 800 !important;
        }

        /* Big Cursor */
        html.big-cursor * {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>'), auto !important;
        }

        /* Improved Focus States */
        :focus-visible {
            outline: 5px solid #EF4444 !important;
            outline-offset: 4px !important;
            box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.2) !important;
        }

        /* Skip to content animation */
        .sr-only:focus {
            clip: auto;
            height: auto;
            width: auto;
            margin: 0;
            overflow: visible;
            position: absolute;
            transition: all 0.2s ease;
        }
    </style>
<script type="importmap">
